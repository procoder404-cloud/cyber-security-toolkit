<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="background-animation"></div>

<nav class="navbar">
    <div class="logo">🛡 Cyber Security Toolkit</div>
    <ul>
        <li><a href="/login"><i class="fa-solid fa-right-to-bracket"></i> Login</a></li>
        <li><a href="/register"><i class="fa-solid fa-user-plus"></i> Register</a></li>
    </ul>
</nav>

<div class="container">
    <h1>Create Account</h1>
    <p>Create a new account to use the Cyber Security Toolkit.</p>
    <br>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <br><br>
        <input type="email" name="email" placeholder="Email" required>
        <br><br>
        <input type="password" name="password" placeholder="Password" required>
        <br><br>
        <button type="submit">Create Account</button>
    </form>

    {% if message %}
    <div class="result" style="margin-top:20px; border-left:5px solid #ff4444;">
        <h3 style="color:#ff4444;">{{ message }}</h3>
    </div>
    {% endif %}

    <br><hr style="border:0; border-top:1px solid rgba(255,255,255,0.1);"><br>
    <p>
        Already have an account? 
        <a href="/login" style="color:#00ffff; font-weight:bold; text-decoration:none;">Login Here</a>
    </p>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script src="{{ url_for('static', filename='matrix.js') }}"></script>
</body>
</html>
